name: Uplift Autograding Engine
on: [push]

jobs:
  grade-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Student Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyTest Framework
        run: pip install pytest

      - name: Run Core Test Suite
        run: pytest tests/test_lab1.py
